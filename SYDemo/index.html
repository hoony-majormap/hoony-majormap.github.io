*{box-sizing:border-box}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeLeft{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeRight{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideOut{to{opacity:0;transform:translateY(-20px);max-height:0;margin:0;padding:0}}
@keyframes drawCheck{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}
@keyframes toastIn{from{transform:translateX(120%)}to{transform:translateX(0)}}
@keyframes toastOut{to{transform:translateX(120%)}}
@keyframes sideIn{from{transform:translateX(-210px)}to{transform:translateX(0)}}
@keyframes badgePulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 0 0 rgba(234,86,69,0)}50%{box-shadow:0 0 16px 4px rgba(234,86,69,0.3)}}
@keyframes typing{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
@keyframes ringPulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(2);opacity:0}}
@keyframes phoneIn{from{opacity:0;transform:translateX(50px) rotate(3deg)}to{opacity:1;transform:translateX(0) rotate(2deg)}}
