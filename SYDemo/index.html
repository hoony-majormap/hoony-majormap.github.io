// ═══ SHARED HOOKS ═══
function useCountUp(t,d=1000,a=true){const[v,setV]=useState(0);useEffect(()=>{if(!a)return;let s=null;const fn=ts=>{if(!s)s=ts;const p=Math.min((ts-s)/d,1);setV(Number.isInteger(t)?Math.round(t*(1-Math.pow(1-p,3))):Math.round(t*(1-Math.pow(1-p,3))*10)/10);if(p<1)requestAnimationFrame(fn);};requestAnimationFrame(fn);},[t,d,a]);return v;}
function useInView(th=.15){const r=useRef();const[v,setV]=useState(false);useEffect(()=>{const el=r.current;if(!el)return;const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold:th});o.observe(el);return()=>o.disconnect();},[th]);return[r,v];}

function Toast({msg,vis,onDone}){useEffect(()=>{if(vis){const t=setTimeout(onDone,3500);return()=>clearTimeout(t);}},[vis]);if(!vis)return null;return<div style={{position:"fixed",top:20,right:20,zIndex:999,padding:"10px 18px",borderRadius:8,background:C.red,color:C.white,fontSize:12,fontWeight:600,boxShadow:"0 4px 16px rgba(0,0,0,.2)",animation:"toastIn .3s,toastOut .3s 3s forwards"}}>✅ {msg}</div>;}

,alignItems:"center",fontSize:9}}><div style={{width:6,height:6,borderRadius:2,background:d.c}}/>{d.n}</div>)}</div></div></div><div style={{background:C.white,borderRadius:10,padding:"12px 16px"}}><div style={{fontSize:12,fontWeight:700,marginBottom:8}}>해결률 추이</div><ResponsiveContainer width="100%" height={100}><LineChart data={LD}><CartesianGrid strokeDasharray="3 3" stroke={C.bg}/><XAxis dataKey="w" tick={{fontSize:7}}/><YAxis domain={[30,90]} tick={{fontSize:7}}/><Line type="monotone" dataKey="r" stroke={C.red} strokeWidth={2} dot={{r:2,fill:C.red}} animationDuration={2000}/></LineChart></ResponsiveContainer></div></div></div>;

  return(
    <div style={{display:"flex",height:"100%",fontFamily:"'Pretendard',system-ui,sans-serif",overflow:"hidden",background:C.bg}}>
